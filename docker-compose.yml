services:
  ifc-ops:
    build:
      context: .
      dockerfile: ifcOps/Dockerfile
    environment:
      - IFC_OPS_DATA_ROOT=/data
    volumes:
      - backend-data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - STORAGE_BASE_DIR=/data
      - IFC_OPEN_SHELL_BASE_URL=http://ifc-ops:8090
    volumes:
      - backend-data:/data
    depends_on:
      - ifc-ops

  frontend:
    build:
      context: ..
      dockerfile: IFCViewerApp/ifcViewer/Dockerfile
      args:
        VITE_API_BASE: /api/projects/1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
