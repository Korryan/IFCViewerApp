services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - STORAGE_BASE_DIR=/data
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: .
      dockerfile: ifcViewer/Dockerfile
      args:
        VITE_API_BASE: /api/projects/1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
